name: Fetch archaeology news

on:
  schedule:
    # Egunean behin, goizeko 07:00etan (Europe/Madrid). UTC: 05:00 udan, 06:00 neguan.
    # Tarteko ordu bat aukeratzen dugu: 05:30 UTC ≈ 06:30/07:30 tokiko orduan.
    - cron: "30 5 * * *"
  workflow_dispatch: {} # Eskuzko trigger Actions fitxatik

permissions:
  contents: write

concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install rss-parser (no project install needed)
        run: npm install --no-save --no-audit --no-fund rss-parser@3

      - name: Fetch RSS feeds
        run: node scripts/fetch-news.mjs

      - name: Commit news.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain public/news.json)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add public/news.json
          git commit -m "chore(news): update news.json [skip ci]"
          # Saiakera anitz: beste commit batek aurreratu badu repo-a, rebase eta birsaiatu.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push OK saiakeran #$i"
              exit 0
            fi
            echo "Push errefusatu da (#$i). Rebase-arekin saiatzen..."
            git pull --rebase --autostash origin main || true
            sleep $((i * 2))
          done
          echo "Push-ak huts egin du 5 saiakeren ondoren."
          exit 1
