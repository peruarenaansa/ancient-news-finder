backend:
  name: git-gateway
  branch: main

# Netlify Identity + Git Gateway erabiltzen ditu (GitHub OAuth gabe konfiguratzeko)
publish_mode: editorial_workflow

media_folder: "public/uploads"
public_folder: "/uploads"

locale: "en" # Decap-en UI-rako; edukia euskaraz idatzi daiteke

site_url: https://aztarnak.netlify.app
display_url: https://aztarnak.netlify.app
logo_url: /placeholder.svg

collections:
  - name: "articles"
    label: "Albiste landuak"
    label_singular: "Albiste landua"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Titulua", name: "title", widget: "string" }
      - { label: "Azpi-titulua", name: "subtitle", widget: "string", required: false }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Egilea", name: "author", widget: "string", required: false }
      - { label: "Irudi nagusia", name: "image", widget: "image", required: false }
      - { label: "Etiketak", name: "tags", widget: "list", required: false }
      - { label: "Laburpena", name: "excerpt", widget: "text", required: false }
      - { label: "Edukia", name: "body", widget: "markdown" }
      - label: "Iturria (aukerakoa)"
        name: "source"
        widget: "object"
        required: false
        fields:
          - { label: "Izena", name: "name", widget: "string", required: false }
          - { label: "URL", name: "url", widget: "string", required: false }

  - name: "notes"
    label: "Ohar laburrak"
    label_singular: "Oharra"
    folder: "content/notes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Titulua", name: "title", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime" }
      - { label: "Etiketak", name: "tags", widget: "list", required: false }
      - { label: "Laburpena", name: "excerpt", widget: "text", required: false }
      - { label: "Edukia (laburra)", name: "body", widget: "markdown" }
