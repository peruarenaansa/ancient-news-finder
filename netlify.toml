[build]
  publish = "dist"
  command = "npm run build"

# SPA fallback (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Decap CMS karpetak (statikoki zerbitzatu, SPA fallback-aren aurretik)
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = false
